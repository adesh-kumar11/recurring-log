<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#D9683C" />
<title>Recurring Log</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --border: #E4DDD2;
    --text: #2B2620;
    --muted: #8A8073;
    --muted2: #A89E90;
    --light: #F0EBE2;
    --danger: #C0563E;
    --input-bg: #FBF9F5;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  header h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  header p {
    font-size: 13px;
    color: var(--muted);
    margin: 0;
  }
  main {
    padding: 16px;
    max-width: 640px;
    margin: 0 auto;
  }
  section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .cat-icon {
    width: 36px; height: 36px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }
  .cat-title { font-weight: 600; font-size: 16px; flex: 1; }
  .cat-count { font-size: 12px; color: var(--muted2); }
  .empty-msg { padding: 16px; font-size: 14px; color: var(--muted2); }
  .item-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--light);
  }
  .item-row:last-child { border-bottom: none; }
  .item-main {
    display: flex; align-items: center; gap: 8px;
    flex: 1; min-width: 0; cursor: pointer;
    background: none; border: none; text-align: left; padding: 0;
    color: inherit; font: inherit;
  }
  .chevron { color: var(--muted2); flex-shrink: 0; transition: transform 0.15s; }
  .chevron.open { transform: rotate(90deg); }
  .item-info { min-width: 0; }
  .item-name { font-weight: 500; font-size: 14px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-sub { font-size: 12px; color: var(--muted2); margin: 2px 0 0; }
  .log-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 7px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 600; color: white;
    border: none; flex-shrink: 0; cursor: pointer;
  }
  .log-date-row {
    padding: 0 16px 12px; display: flex; gap: 8px; align-items: center;
    border-bottom: 1px solid var(--light);
  }
  .log-date-row input[type=date] {
    flex: 1; font-size: 14px; border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px; background: var(--input-bg); color: var(--text);
  }
  .btn-save {
    padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
    color: white; border: none; cursor: pointer;
  }
  .btn-icon {
    border: none; background: none; color: var(--muted2); cursor: pointer;
    display: flex; align-items: center; padding: 6px;
  }
  .expanded-panel {
    padding: 0 16px 16px 44px;
    border-bottom: 1px solid var(--light);
  }
  .chart-wrap { margin-bottom: 12px; }
  .chart-label { font-size: 12px; color: var(--muted2); margin: 0 0 6px; }
  .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 48px; }
  .chart-bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .chart-bar { width: 100%; border-radius: 4px 4px 0 0; }
  .chart-bar-label { font-size: 9px; color: var(--muted2); margin-top: 4px; }
  .history-list { list-style: none; margin: 0 0 12px; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .history-item { display: flex; align-items: center; justify-content: space-between; font-size: 14px; }
  .history-date { display: flex; align-items: center; gap: 8px; color: #5C5347; }
  .no-history { font-size: 12px; color: var(--muted2); margin: 0 0 12px; }
  .item-actions { display: flex; align-items: center; gap: 14px; font-size: 12px; flex-wrap: wrap; }
  .link-btn {
    border: none; background: none; color: var(--muted); text-decoration: underline;
    cursor: pointer; font-size: 12px; padding: 0;
  }
  .link-btn.danger { color: var(--danger); }
  .move-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .move-pill {
    padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border);
    background: none; color: #5C5347; font-size: 12px; cursor: pointer;
  }
  .add-item-row {
    display: flex; align-items: center; gap: 8px; padding: 12px 16px;
  }
  .add-item-row input[type=text] {
    flex: 1; font-size: 14px; border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px; background: var(--input-bg); color: var(--text);
  }
  .add-item-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 12px 16px; border: none; background: none;
    color: var(--muted); font-size: 14px; cursor: pointer; text-align: left;
  }
  .footer-note {
    text-align: center; font-size: 12px; color: #C9BFB1;
    padding: 8px 0 32px;
  }
  svg { display: block; }
</style>
</head>
<body>
<header>
  <h1>Recurring Log</h1>
  <p>Track when you last did it — gas refills, servicing, filters, anything periodic.</p>
</header>
<main id="app"></main>

<script src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>

</body>
</html>
